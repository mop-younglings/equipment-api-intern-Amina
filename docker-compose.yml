services:
  postgres:
    image: postgres:16-alpine
    container_name: equipment-api-postgres
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: equipment
      POSTGRES_PASSWORD: equipment
      POSTGRES_DB: equipment_api
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U equipment -d equipment_api']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
