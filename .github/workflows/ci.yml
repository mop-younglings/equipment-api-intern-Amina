name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore EquipmentApi.sln

      - name: Build
        run: dotnet build EquipmentApi.sln --configuration Release --no-restore

      - name: Build Docker image
        run: docker build -t equipment-api:${{ github.sha }} .
